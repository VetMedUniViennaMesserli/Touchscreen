<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rule Learning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: system-ui, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* ── Screen management ─────────────────────────────────────────── */
    .screen {
      display: none;
      width: 100vw; height: 100vh;
      position: absolute; top: 0; left: 0;
    }
    @supports (height: 100dvh) { .screen { height: 100dvh; } }
    .screen.active { display: flex; }

    /* ── ID entry screen ───────────────────────────────────────────── */
    #screen-id {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      gap: 32px;
      padding: 40px;
    }
    #screen-id h1 {
      font-size: clamp(22px, 4vw, 36px);
      font-weight: bold;
      text-align: center;
    }
    #screen-id p {
      font-size: 16px;
      color: #aaa;
      text-align: center;
      max-width: 480px;
      line-height: 1.5;
    }
    #id-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 360px;
    }
    #id-form label {
      font-size: 16px;
      color: #bbb;
      align-self: flex-start;
    }
    #id-input {
      width: 100%;
      padding: 14px 18px;
      font-size: 20px;
      background: #111;
      border: 2px solid #444;
      border-radius: 8px;
      color: #fff;
      text-align: center;
      letter-spacing: 0.08em;
      outline: none;
    }
    #id-input:focus { border-color: #1a7a4a; }
    #id-error {
      font-size: 14px;
      color: #e06060;
      min-height: 18px;
    }
    #id-start-btn {
      width: 100%;
      height: 60px;
      font-size: 18px;
      font-weight: bold;
      background: #1a7a4a;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
    }
    #id-start-btn:active { background: #1faa64; }

    /* ── Task screen ───────────────────────────────────────────────── */
    #screen-task {
      align-items: center;
      justify-content: center;
      gap: 8vw;
    }
    .shape-btn {
      width:  min(40vh, 43vw);
      height: min(40vh, 43vw);
      background: transparent;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border-radius: 8px;
      padding: 0;
    }
    .shape-btn svg { width: 100%; height: 100%; display: block; }
    .shape-btn.hidden { visibility: hidden; pointer-events: none; }

    @keyframes btn-press {
      0%   { transform: scale(1);    filter: brightness(1); }
      25%  { transform: scale(0.84); filter: brightness(1.5); }
      100% { transform: scale(1);    filter: brightness(1); }
    }
    @keyframes btn-correct {
      0%   { transform: scale(0.84); filter: brightness(1.5) drop-shadow(0 0 24px #00ff80); }
      100% { transform: scale(1);    filter: brightness(1)   drop-shadow(0 0 0px #00ff80); }
    }
    @keyframes btn-wrong {
      0%   { transform: scale(0.84); filter: brightness(1.5) drop-shadow(0 0 24px #ff2020); }
      100% { transform: scale(1);    filter: brightness(1)   drop-shadow(0 0 0px #ff2020); }
    }
    .shape-btn.anim-press   { animation: btn-press   0.18s ease-out forwards; }
    .shape-btn.anim-correct { animation: btn-correct 0.35s ease-out forwards; }
    .shape-btn.anim-wrong   { animation: btn-wrong   0.18s ease-out forwards; }

    /* ── Session-end screen ────────────────────────────────────────── */
    #screen-end {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      gap: 40px;
      padding: 32px;
      text-align: center;
    }
    #end-msg {
      font-size: clamp(18px, 3vw, 26px);
      white-space: pre-line;
      line-height: 1.6;
    }
    #end-btns { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    #end-btns button {
      padding: 18px 36px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      min-width: 160px;
    }
    #btn-continue { background: #1a7a4a; color: #fff; }

    /* ── Completion screen ─────────────────────────────────────────── */
    #screen-complete {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      gap: 36px;
      padding: 40px;
      text-align: center;
    }
    #complete-msg {
      font-size: clamp(20px, 3vw, 28px);
      line-height: 1.7;
      max-width: 600px;
      color: #eee;
    }
    #btn-survey {
      padding: 20px 48px;
      font-size: 20px;
      font-weight: bold;
      background: #1a7a4a;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    #btn-survey:active { background: #1faa64; }
  </style>
</head>
<body>

<!-- ── ID code entry ──────────────────────────────────────────────── -->
<div id="screen-id" class="screen active">
  <h1>Rule Learning Task</h1>
  <p>Please enter your ID code to begin.</p>
  <div id="id-form">
    <label for="id-input">Your ID code:</label>
    <input id="id-input" type="text" autocomplete="off" autocorrect="off"
           spellcheck="false" placeholder="e.g. AB123">
    <div id="id-error"></div>
    <button id="id-start-btn">Start Task</button>
  </div>
</div>

<!-- ── Task screen ───────────────────────────────────────────────── -->
<div id="screen-task" class="screen">
  <button class="shape-btn" id="btn-left">
    <svg id="svg-left" viewBox="0 0 100 100"></svg>
  </button>
  <button class="shape-btn" id="btn-right">
    <svg id="svg-right" viewBox="0 0 100 100"></svg>
  </button>
</div>

<!-- ── Session-end screen ────────────────────────────────────────── -->
<div id="screen-end" class="screen">
  <div id="end-msg"></div>
  <div id="end-btns">
    <button id="btn-continue">Continue</button>
  </div>
</div>

<!-- ── Completion screen ─────────────────────────────────────────── -->
<div id="screen-complete" class="screen">
  <div id="complete-msg">
    This task has been completed.<br><br>
    Please continue to the next page to answer a few last questions.
  </div>
  <a id="btn-survey"
     href="https://app.onlinesurveys.jisc.ac.uk/s/stirling/choice-task-questions"
     target="_blank" rel="noopener">
    Continue to survey
  </a>
</div>

<script>
'use strict';

// ─── Constants ───────────────────────────────────────────────────
// NOTE: set GDRIVE_URL to the Google Apps Script deployment URL
// (obtained from Kirsten's script: share the deployed web app URL, not the edit link)
const GDRIVE_URL = 'https://script.google.com/macros/s/AKfycbzpL20cM_BGfE2YGtPYJW80VXuS5DMCljs5Li-BLj60aDTF1Eu6NDLP9EoUFBph5bsc/exec';

const TIMEOUT_MS         = 180_000;
const MAX_CORR           = 5;
const ER_REPS            = 2;
const FEEDBACK_MS        = 800;
const ITI_CORRECT_MS     = 200;
const N_TRIALS           = 24;

const OPPOSITE = {
  black:'white', white:'black', blue:'yellow', yellow:'blue',
  triangle:'circle', circle:'triangle', star:'square', square:'star',
};

const SHAPE_FILL = {
  black:'#111', white:'#fff', yellow:'#ffd200', blue:'#1e50c8',
};

const BG_CSS = {
  lightgrey: '#b4b4b4',
  striped:   'repeating-linear-gradient(45deg,#505050 0px,#505050 24px,#a0a0a0 24px,#a0a0a0 48px)',
  black:     '#000',
};

const WRONG_BG   = '#c80000';
const TIMEOUT_BG = '#dcb800';
const SUCCESS_HZ = 600;
const FAILURE_HZ = 200;

// ─── Counterbalancing table ───────────────────────────────────────
// 8 configurations cycling through all combinations of rule order,
// background assignment, target stimulus, and transfer stimulus.
const COUNTERBALANCING = [
  {firstRule:'RuleA', bgA:'lightgrey', targetStim:'black triangle', transferStim:'blue star'},
  {firstRule:'RuleB', bgA:'striped',   targetStim:'white triangle', transferStim:'yellow square'},
  {firstRule:'RuleA', bgA:'striped',   targetStim:'black circle',   transferStim:'blue star'},
  {firstRule:'RuleB', bgA:'lightgrey', targetStim:'white circle',   transferStim:'yellow square'},
  {firstRule:'RuleA', bgA:'lightgrey', targetStim:'white triangle', transferStim:'yellow square'},
  {firstRule:'RuleB', bgA:'striped',   targetStim:'black circle',   transferStim:'blue star'},
  {firstRule:'RuleA', bgA:'striped',   targetStim:'white circle',   transferStim:'yellow square'},
  {firstRule:'RuleB', bgA:'lightgrey', targetStim:'black triangle', transferStim:'blue star'},
];

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

// ─── Audio ───────────────────────────────────────────────────────

let _audioCtx = null;
function getAudio() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}
function playTone(freq, dur = 0.35) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    osc.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.5, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

// ─── Shape rendering ─────────────────────────────────────────────

const SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function renderShape(svgElem, shape, color, visible) {
  svgElem.innerHTML = '';
  if (!visible) return;

  const fill = SHAPE_FILL[color] ?? '#888';
  const common = { fill, stroke: '#000', 'stroke-width': 3 };

  if (shape === 'circle') {
    svgElem.appendChild(svgEl('circle', { cx:50, cy:50, r:40, ...common }));

  } else if (shape === 'square') {
    svgElem.appendChild(svgEl('rect', { x:10, y:10, width:80, height:80, ...common }));

  } else if (shape === 'triangle') {
    svgElem.appendChild(svgEl('polygon', { points:'50,10 90,90 10,90', ...common }));

  } else if (shape === 'star') {
    // Larger outer radius and less-spiky inner radius to match square visual weight
    const pts = Array.from({length:10}, (_,i) => {
      const r = i%2===0 ? 46 : 23;
      const a = Math.PI*i/5 - Math.PI/2;
      return `${50+r*Math.cos(a)},${50+r*Math.sin(a)}`;
    }).join(' ');
    svgElem.appendChild(svgEl('polygon', { points: pts, ...common }));

  } else if (shape === 'cross') {
    const g = svgEl('g', {});
    for (const [x,y,w,h] of [[36,10,28,80],[10,36,80,28]]) {
      g.appendChild(svgEl('rect', { x,y,width:w,height:h, ...common }));
    }
    svgElem.appendChild(g);
  }
}

// ─── Trial builders ───────────────────────────────────────────────

function quad(n) { return n - (n % 4); }

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = 0|Math.random()*(i+1);
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function noRepeat(t) {
  t = [...t];
  for (let a=0; a<1000; a++) {
    if (t.every((r,i) => i===0 || !(r.leftShape===t[i-1].leftShape && r.leftColor===t[i-1].leftColor &&
        r.rightShape===t[i-1].rightShape && r.rightColor===t[i-1].rightColor))) return t;
    shuffle(t);
  }
  return t;
}

function maxSideStreak(t, max=3) {
  t = [...t];
  for (let a=0; a<1000; a++) {
    let s=1, ok=true;
    for (let i=1; i<t.length; i++) {
      if (t[i].correctSide===t[i-1].correctSide) { if (++s>max) { ok=false; break; } }
      else s=1;
    }
    if (ok) return t; shuffle(t);
  }
  return t;
}

function maxRuleStreak(t, max=3) {
  t = [...t];
  for (let a=0; a<1000; a++) {
    let s=1, ok=true;
    for (let i=1; i<t.length; i++) {
      if (t[i].rule===t[i-1].rule) { if (++s>max) { ok=false; break; } }
      else s=1;
    }
    if (ok) return t; shuffle(t);
  }
  return t;
}

function moveType1First(trials, tS, tC) {
  const i = trials.findIndex(t =>
    (t.leftShape===tS && t.leftColor===tC) || (t.rightShape===tS && t.rightColor===tC));
  if (i > 0) [trials[0],trials[i]] = [trials[i],trials[0]];
  return trials;
}

function moveType2First(trials, tS, tC) {
  // First trial where the correct side does NOT have both tgt_shape+tgt_color
  const i = trials.findIndex(t => {
    const [s, c] = t.correctSide==='left'
      ? [t.leftShape, t.leftColor] : [t.rightShape, t.rightColor];
    return !(s===tS && c===tC);
  });
  if (i > 0) [trials[0],trials[i]] = [trials[i],trials[0]];
  return trials;
}

// Exactly n/4 of each sub-type: (left|right) × (common S+|other S+)
function buildRuleA(n, tS, oS, tC, oC) {
  n = quad(n);
  const quarter = n / 4;
  let pool = [];
  for (const cs of ['left', 'right']) {
    for (const ts of [tS, oS]) {
      const os = ts===tS ? oS : tS;
      const [ls,rs,lc,rc] = cs==='left' ? [ts,os,tC,oC] : [os,ts,oC,tC];
      for (let i=0; i<quarter; i++)
        pool.push({ rule:'RuleA', leftShape:ls, leftColor:lc, rightShape:rs, rightColor:rc, correctSide:cs });
    }
  }
  shuffle(pool);
  pool = noRepeat(pool);
  pool = maxSideStreak(pool, 3);
  return pool;
}

function buildRuleB(n, tS, oS, tC, oC) {
  n = quad(n);
  const quarter = n / 4;
  let pool = [];
  for (const cs of ['left', 'right']) {
    for (const tc of [tC, oC]) {
      const oc = tc===tC ? oC : tC;
      const [ls,rs,lc,rc] = cs==='left' ? [tS,oS,tc,oc] : [oS,tS,oc,tc];
      for (let i=0; i<quarter; i++)
        pool.push({ rule:'RuleB', leftShape:ls, leftColor:lc, rightShape:rs, rightColor:rc, correctSide:cs });
    }
  }
  shuffle(pool);
  pool = noRepeat(pool);
  pool = maxSideStreak(pool, 3);
  return pool;
}

// Preserve block structure: first-rule block then second-rule block (each internally balanced)
function buildAlternate(n, tS, oS, tC, oC, start) {
  n = quad(n); const h = n/2;
  const a = buildRuleA(h, tS, oS, tC, oC);
  const b = buildRuleB(h, tS, oS, tC, oC);
  return start==='RuleA' ? [...a,...b] : [...b,...a];
}

function buildMixed(n, tS, oS, tC, oC) {
  n = quad(n); const h = n/2;
  let t = shuffle([...buildRuleA(h,tS,oS,tC,oC), ...buildRuleB(h,tS,oS,tC,oC)]);
  t = maxRuleStreak(t, 3);
  t = noRepeat(t);
  t = maxSideStreak(t, 3);
  return t;
}

function buildPhase(phase, n, tS, oS, tC, oC, firstRule, xS, xoS, xC, xoC) {
  if (phase==='RuleA')               return buildRuleA(n, tS, oS, tC, oC);
  if (phase==='RuleB')               return buildRuleB(n, tS, oS, tC, oC);
  if (phase==='Alternate')           return buildAlternate(n, tS, oS, tC, oC, firstRule);
  if (phase==='Mixed')               return buildMixed(n, tS, oS, tC, oC);
  if (phase==='AlternatingTransfer') return buildAlternate(n, xS, xoS, xC, xoC, firstRule);
  if (phase==='MixedTransfer')       return buildMixed(n, xS, xoS, xC, xoC);
  return [];
}

// ─── CSV log ──────────────────────────────────────────────────────

const CSV_COLS = [
  'subjectID','date','time','phase','phase_count','session_count',
  'trial_count','target_color','target_shape','bg_shown','rule',
  'left_shape','left_color','right_shape','right_color',
  'commonSp','left_stim','right_stim','trial_type',
  'target_side','choice_side','reward_score',
  'choice_shape','choice_color','choice_latency','correction_trial',
];

function padZ(n) { return String(n).padStart(2,'0'); }
function fmtDate(d) { return `${d.getFullYear()}-${padZ(d.getMonth()+1)}-${padZ(d.getDate())}`; }
function fmtTimeDash(d)  { return `${padZ(d.getHours())}-${padZ(d.getMinutes())}-${padZ(d.getSeconds())}`; }
function fmtTimeColon(d) { return `${padZ(d.getHours())}:${padZ(d.getMinutes())}:${padZ(d.getSeconds())}`; }

class CsvLog {
  constructor(id) {
    const now = new Date();
    this.filename = `Rule_Learning_${id}_${fmtDate(now)}_${fmtTimeDash(now)}.csv`;
    this.rows = [CSV_COLS.join(',')];
  }
  write(data) {
    this.rows.push(CSV_COLS.map(c => String(data[c] ?? '').replace(/,/g,'；')).join(','));
  }
  toCsvString() {
    return this.rows.join('\r\n');
  }
  download() {
    const blob = new Blob([this.toCsvString()], { type:'text/csv' });
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob), download: this.filename
    });
    a.click(); URL.revokeObjectURL(a.href);
  }
}

// ─── Google Drive upload ──────────────────────────────────────────

function uploadToGDrive(csvLog) {
  if (!GDRIVE_URL) return;
  try {
    // no-cors + no Content-Type header avoids CORS preflight, which Apps Script can't handle.
    // The body is still received as JSON text by doPost via e.postData.contents.
    fetch(GDRIVE_URL, {
      method: 'POST',
      mode:   'no-cors',
      body:   JSON.stringify({ filename: csvLog.filename, content: csvLog.toCsvString() }),
    }).catch(() => {});
  } catch(e) {}
}

// ─── Settings builder ─────────────────────────────────────────────

function buildSettings(identifierCode) {
  const cb = COUNTERBALANCING[hashStr(identifierCode) % COUNTERBALANCING.length];
  const firstRule = cb.firstRule;
  const bgA       = cb.bgA;
  const bgB       = bgA === 'lightgrey' ? 'striped' : 'lightgrey';
  const [tC, tS]  = cb.targetStim.split(' ');
  const [xC, xS]  = cb.transferStim.split(' ');

  // No PreTraining for web version
  const phases = [
    ...(firstRule==='RuleA' ? ['RuleA','RuleB'] : ['RuleB','RuleA']),
    'Alternate', 'Mixed', 'AlternatingTransfer', 'MixedTransfer',
  ];

  return {
    individualId:  identifierCode,
    firstRule, bgA, bgB,
    ruleBg: { RuleA:bgA, RuleB:bgB },
    tgtColor:tC, tgtShape:tS, othColor:OPPOSITE[tC], othShape:OPPOSITE[tS],
    xfrTgtColor:xC, xfrTgtShape:xS, xfrOthColor:OPPOSITE[xC], xfrOthShape:OPPOSITE[xS],
    phases,
    nTrials: N_TRIALS,
  };
}

// ─── App state ────────────────────────────────────────────────────

let _s                 = null;
let _csv               = null;
let _phaseIdx          = 0;
let _phaseSessionCount = 0;
let _trials            = [];
let _trialIdx          = 0;
let _trialCount        = 0;
let _correction        = 0;
let _correctT1         = 0;
let _correctT2         = 0;
let _current           = null;
let _erTrials          = [];
let _erIdx             = 0;
let _inER              = false;
let _erBg              = 'black';
let _respStart         = 0;
let _toTimer           = null;
let _accepting         = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setTaskBg(name) {
  document.getElementById('screen-task').style.background = BG_CSS[name] ?? '#000';
}

// ─── Phase / session ──────────────────────────────────────────────

function curPhase() { return _s.phases[_phaseIdx] ?? null; }
function isXfr(p)   { return (p ?? curPhase() ?? '').includes('Transfer'); }

function curStimuli() {
  return isXfr()
    ? [_s.xfrTgtShape, _s.xfrOthShape, _s.xfrTgtColor, _s.xfrOthColor]
    : [_s.tgtShape, _s.othShape, _s.tgtColor, _s.othColor];
}

function startSession(identifierCode) {
  _s   = buildSettings(identifierCode);
  _csv = new CsvLog(identifierCode);
  _phaseIdx = 0; _phaseSessionCount = 0;
  beginPhase();
}

function beginPhase() {
  const phase = curPhase();
  if (!phase) { endExperiment(); return; }

  _phaseSessionCount++;
  _trialIdx=0; _trialCount=0; _correction=0;
  _correctT1=0; _correctT2=0;

  // Log session start and upload immediately
  const _startNow = new Date();
  _csv.write({
    subjectID:_s.individualId, date:fmtDate(_startNow), time:fmtTimeColon(_startNow),
    phase, phase_count:_phaseIdx+1, session_count:_phaseSessionCount,
    trial_count:0, target_color:_s.tgtColor, target_shape:_s.tgtShape,
    rule:'SESSION_START',
  });
  uploadToGDrive(_csv);

  const [tS,oS,tC,oC] = curStimuli();
  _trials = buildPhase(phase, _s.nTrials, tS, oS, tC, oC, _s.firstRule,
    _s.xfrTgtShape, _s.xfrOthShape, _s.xfrTgtColor, _s.xfrOthColor);

  // First regular trial after ER: type-2 for transfer, type-1 for all others
  if (isXfr(phase)) {
    moveType2First(_trials, curStimuli()[0], curStimuli()[2]);
  } else {
    moveType1First(_trials, curStimuli()[0], curStimuli()[2]);
  }

  _inER = true;
  _erTrials = shuffle([...Array(ER_REPS).fill('left'), ...Array(ER_REPS).fill('right')])
               .map(cs => ({correctSide:cs}));
  _erIdx = 0;

  showScreen('screen-task');
  nextTrial();
}

function nextTrial() {
  if (_inER) {
    if (_erIdx < _erTrials.length) { showER(); return; }
    _inER = false;
  }
  if (_trialIdx >= _trials.length) { evaluateSession(); return; }
  _current = _trials[_trialIdx]; _correction = 0; _trialCount++;
  showTrial();
}

function showER() {
  const er=_erTrials[_erIdx], cs=er.correctSide, phase=curPhase();
  let tS, tC;
  if (isXfr(phase)) {
    _erBg = 'black'; tS=_s.xfrTgtShape; tC=_s.xfrTgtColor;
  } else {
    const fr=_trials[0]?.rule??'RuleA'; _erBg=_s.ruleBg[fr]; tS=_s.tgtShape; tC=_s.tgtColor;
  }
  setTaskBg(_erBg);
  renderShape(document.getElementById('svg-left'),  tS, tC, cs==='left');
  renderShape(document.getElementById('svg-right'), tS, tC, cs==='right');
  document.getElementById('btn-left').classList.toggle('hidden',  cs!=='left');
  document.getElementById('btn-right').classList.toggle('hidden', cs!=='right');
  _current = { rule:(_trials[0]?.rule??'RuleA'), correctSide:cs, trialType:0,
    leftShape:cs==='left'?tS:null, leftColor:cs==='left'?tC:null,
    rightShape:cs==='right'?tS:null, rightColor:cs==='right'?tC:null };
  _correction = 0;
  startTimer();
}

function showTrial() {
  const tr=_current, phase=curPhase();
  setTaskBg(_s.ruleBg[tr.rule]);
  renderShape(document.getElementById('svg-left'),  tr.leftShape,  tr.leftColor,  true);
  renderShape(document.getElementById('svg-right'), tr.rightShape, tr.rightColor, true);
  document.getElementById('btn-left').classList.remove('hidden');
  document.getElementById('btn-right').classList.remove('hidden');
  startTimer();
}

function startTimer() {
  clearTimeout(_toTimer);
  _respStart = performance.now();
  _accepting = true;
  _toTimer = setTimeout(() => respond(null,null,null), TIMEOUT_MS);
}

// ─── Response ─────────────────────────────────────────────────────

function respond(side, shape, color) {
  if (!_accepting) return;
  _accepting = false;
  clearTimeout(_toTimer); _toTimer=null;

  const tr=_current, tgt=tr.correctSide;
  const timeout=side===null, correct=!timeout&&side===tgt;
  const latency=((performance.now()-_respStart)/1000).toFixed(3);
  const phase=curPhase();

  // Trial type: 0 for ER trials, 1=common S+, 2=other S+
  let trialType = 0;
  if (!_inER && tr.trialType !== 0) {
    const [tS,,tC] = curStimuli();
    const [ps,pc]  = tgt==='left' ? [tr.leftShape,tr.leftColor] : [tr.rightShape,tr.rightColor];
    trialType = (ps===tS && pc===tC) ? 1 : 2;
  }

  // Score first attempts only (no corrections, no ER)
  if (!_inER && _correction===0) {
    if (correct) { if(trialType===1) _correctT1++; else _correctT2++; }
  }

  // Log ALL trials (ER and regular)
  {
    const [tS,,tC] = curStimuli();
    const bgKey = _inER ? _erBg : (_s.ruleBg[tr.rule] ?? 'lightgrey');
    const bgShown = bgKey==='lightgrey' ? 'grey' : bgKey;

    // Stim strings: "none" for hidden side in ER trials
    let leftStim, rightStim;
    if (_inER) {
      leftStim  = tr.leftColor  ? `${tr.leftColor} ${tr.leftShape}`   : 'none';
      rightStim = tr.rightColor ? `${tr.rightColor} ${tr.rightShape}` : 'none';
    } else {
      leftStim  = `${tr.leftColor??'none'} ${tr.leftShape??'none'}`;
      rightStim = `${tr.rightColor??'none'} ${tr.rightShape??'none'}`;
    }

    const now = new Date();
    _csv.write({
      subjectID: _s.individualId, date:fmtDate(now), time:fmtTimeColon(now),
      phase, phase_count:_phaseIdx+1, session_count:_phaseSessionCount,
      trial_count: _inER ? 0 : _trialCount,
      target_color:_s.tgtColor, target_shape:_s.tgtShape,
      bg_shown: bgShown,
      rule: tr.rule ?? '',
      left_shape:  tr.leftShape  ?? 'none', left_color:  tr.leftColor  ?? 'none',
      right_shape: tr.rightShape ?? 'none', right_color: tr.rightColor ?? 'none',
      commonSp: `${tC} ${tS}`,
      left_stim: leftStim, right_stim: rightStim,
      trial_type: trialType, target_side: tgt,
      choice_side: side??'NA', reward_score: correct?1:0,
      choice_shape: shape??'NA', choice_color: color??'NA',
      choice_latency: latency, correction_trial: _correction,
    });
  }

  // Visual feedback on the clicked button
  function animBtn(btnId, cls) {
    const b = document.getElementById(btnId);
    b.classList.remove('anim-press','anim-correct','anim-wrong');
    void b.offsetWidth;
    b.classList.add(cls);
    b.addEventListener('animationend', () => b.classList.remove(cls), { once: true });
  }

  if (timeout) {
    playTone(FAILURE_HZ);
    document.getElementById('screen-task').style.background = TIMEOUT_BG;
    _correction++;
    setTimeout(_inER ? showER : showTrial, FEEDBACK_MS);
  } else if (correct) {
    playTone(SUCCESS_HZ);
    animBtn(side==='left'?'btn-left':'btn-right', 'anim-correct');
    setTimeout(advance, ITI_CORRECT_MS);
  } else {
    playTone(FAILURE_HZ);
    animBtn(side==='left'?'btn-left':'btn-right', 'anim-wrong');
    document.getElementById('screen-task').style.background = WRONG_BG;
    if (_correction < MAX_CORR-1) { _correction++; setTimeout(_inER ? showER : showTrial, FEEDBACK_MS); }
    else setTimeout(advance, FEEDBACK_MS);
  }
}

function advance() { if(_inER) _erIdx++; else _trialIdx++; nextTrial(); }

// ─── Session end ──────────────────────────────────────────────────

function evaluateSession() {
  const phase = curPhase();
  // Criterion: 10 out of 12 trials per trial type (scales with nTrials)
  const crit = Math.round(_s.nTrials / 2 * 10 / 12);
  const met  = _correctT1 >= crit && _correctT2 >= crit;
  if (met) { _phaseIdx++; _phaseSessionCount = 0; }

  const next = _s.phases[_phaseIdx] ?? 'Done';
  const outcome = met ? `Next: ${next}` : 'Repeating session…';

  document.getElementById('end-msg').textContent =
    `Score: ${_correctT1+_correctT2} / ${_s.nTrials}\n\n${met?'Criterion reached!':'Criterion not reached.'}\n\n${outcome}`;
  document.getElementById('btn-continue').textContent = met ? 'Continue' : 'Repeat';

  uploadToGDrive(_csv);   // save snapshot after every session, not just at the end
  showScreen('screen-end');
}

function endExperiment() {
  // Upload data to Google Drive, then show completion screen
  uploadToGDrive(_csv);
  showScreen('screen-complete');
}

// ─── Input handling ───────────────────────────────────────────────

function onChoice(side) {
  if (!_accepting) return;
  const btn = document.getElementById(side==='left'?'btn-left':'btn-right');
  if (btn.classList.contains('hidden')) return;
  const tr = _current; if (!tr) return;
  respond(side, side==='left'?tr.leftShape:tr.rightShape,
                side==='left'?tr.leftColor:tr.rightColor);
}

document.getElementById('btn-left').addEventListener('click',  ()=>onChoice('left'));
document.getElementById('btn-right').addEventListener('click', ()=>onChoice('right'));
document.addEventListener('keydown', e => {
  if (e.key==='a'||e.key==='A') onChoice('left');
  if (e.key==='d'||e.key==='D') onChoice('right');
});

// ─── Wiring: ID entry screen ──────────────────────────────────────

document.getElementById('id-start-btn').addEventListener('click', () => {
  const code = document.getElementById('id-input').value.trim();
  const errEl = document.getElementById('id-error');
  if (!code || !/^[a-zA-Z0-9]+$/.test(code)) {
    errEl.textContent = 'Please enter a valid alphanumeric code (letters and numbers only).';
    return;
  }
  errEl.textContent = '';
  startSession(code);
});

document.getElementById('id-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('id-start-btn').click();
});

// ─── Wiring: session-end screen ───────────────────────────────────

document.getElementById('btn-continue').addEventListener('click', () => beginPhase());

</script>
</body>
